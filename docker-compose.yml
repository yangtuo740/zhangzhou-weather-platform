version: "3.8"

services:
  app:
    build: .
    container_name: weather-platform
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/equipment.db:/app/equipment.db
    environment:
      - SECRET_KEY=${SECRET_KEY:-zhangzhou-weather-platform-2026}
      - DATABASE_URL=sqlite:///./equipment.db
      - UPLOAD_DIR=./uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3